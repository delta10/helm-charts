replicaCount: 1

image:
  repository: ghcr.io/delta10/signalen-frontend-wcag
  pullPolicy: IfNotPresent
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

config:
  baseUrlApi: https://api.meldingen-acpt.brabant.delta10.cloud/
  pdokUrlApi: https://api.pdok.nl/bzk/locatieserver/
  frontendUrl: https://meldingen-acpt.brabant.delta10.cloud
  maptilerApiKey: x0IfDO01xuLQQKYlSzuz
  maptilerMap: https://api.maptiler.com/maps/nl-cartiqo-topo
  maptilerMapDarkMode: https://api.maptiler.com/maps/streets-v2-dark
  maptilerOutOfBoundsSelectionArea: https://api.maptiler.com/tiles/019bff1a-5275-7f4c-ba32-70c3d26b4122/tiles.json?key=K3FQAjXPERToZYyHKNPG
  restrictSelectionArea: true
  maptilerOutOfBoundsLayerId: difference
  base:
    municipality: Noord-Brabant
    theme: brabant
    fonts:
      googleStylesheetUrl: https://fonts.googleapis.com/css2?family=Jost:wght@700&display=swap
    pdok_address_suggest:
      scope: provincie
      organization: Noord-Brabant
    municipality_display_name: Noord-Brabant
    assets_url: https://meldingen-acpt.brabant.delta10.cloud/
    supportedLanguages:
    - label: Schakel over naar het Nederlands
      lang: nl
      name: Nederlands
    naam: provincie Noord-Brabant
    header:
      logo:
        alt: Provincie Noord-Brabant logo, naar de homepagina
        url: logo_provincie_noord-brabant.svg
        width: 300
        height: 37.5
    contact:
      tel: 073 68 12 812
    map:
      find_address_in_distance: 30
      minimal_zoom: 17
      center:
      - 51.59
      - 5.12
      maxBounds:
      - - 3.31497114423
        - 50.803721015
      - - 7.09205325687
        - 53.5104033474
      default_zoom: 10
    links:
      about: https://signalen.org
      accessibility: https://signalen.org
      help: https://signalen.org/
      home: https://brabant.nl/
      privacy: https://www.brabant.nl/@3657/privacyverklaring/
    i18n:
      nl:
        describe_report:
          alert:
            help_text: 'Problemen met het indienen van een melding? Bel [073 - 68 12
              812](tel:+31736812812). Wij zijn bereikbaar van maandag tot en met vrijdag
              van 8:00 uur tot 18:00 uur. Bel bij calamiteiten: [073 - 680 73 68](tel:+31736807368).  U
              belt dit telefoonnummer als de veiligheid of doorstroming op één van de
              provinciale wegen acuut belemmerd wordt. Een provinciale weg heeft altijd
              een N-nummer. Het telefoonnummer is 24 uur per dag, 7 dagen per week bereikbaar.'
      en:
        describe_report:
          alert:
            help_text: 'Having trouble submitting a report? Call [073 - 68 12 812](tel:+31736812812).
              We are available monday through friday from 8:00 AM to 6:00 PM. Call for
              emergencies: [073 - 680 73 68](tel:+31736807368). You call this phone
              number if security or traffic on one of the provincial roads is urgently
              blocked. A provincial road always has an N number. The phone number is
              available 24 hours a day, 7 days a week.'

# These are mounted in /app/design-tokens/organizations/custom.json
customDesignTokens: {}

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 3000

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
